{% set name = "gmpyinfr_telegram" %}
{% set version = "0.0.4" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/gmpyinfr_telegram-{{ version }}.tar.gz
  sha256: 2d78aba44d96e50b508f859727084ff99d725bb524bbe4bba167ef2d2b2723f9

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - requests >=2.24.0

test:
  imports:
    - gmpyinfr_telegram
    - gmpyinfr_telegram.utils
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/gmpyinfr-telegram/
  summary: Infraestrutura do telegram python de uma equipe de Ciencia de Dados
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE

extra:
  recipe-maintainers:
    - anewmanvs
